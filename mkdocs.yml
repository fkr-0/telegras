site_name: telegras
site_description: Telegram + FastAPI ingestion core with pluggable publication backends
site_url: https://telegras.fkr.dev
repo_url: https://github.com/fkr-0/telegras
repo_name: fkr-0/telegras

docs_dir: docs
site_dir: site
strict: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Webhook Attachments: webhook-attachments.md
  - Telegram API Extraction: telegram-api-extraction.md
  - API Reference: api/index.md

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            separate_signature: true
            members_order: source
